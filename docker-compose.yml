services:
  postgres:
    image: postgres:18-alpine
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PG_DBNAME:-fam2026}
      POSTGRES_USER: ${PG_USER:-fam2026}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER:-fam2026} -d ${PG_DBNAME:-fam2026}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/gxjakkap/fam2026-web:latest
    environment:
      NODE_ENV: production
      PORT: 8080
      HOSTNAME: "0.0.0.0"
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-fam2026}
      PG_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      PG_DBNAME: ${PG_DBNAME:-fam2026}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
    networks:
      - internal
      - public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      labels:
        - "wud.watch=true"
        - "wud.tag.include=^latest$$"
        - "wud.watch.digest=true"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run --protocol http2
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:?CF_TUNNEL_TOKEN is required}
    networks:
      - public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  wud:
    image: getwud/wud:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - wud_store:/store
    environment:
      WUD_WATCHER_LOCAL_WATCHALL: "false"
      WUD_WATCHER_LOCAL_WATCHBYDEFAULT: "false"
      WUD_REGISTRY_GHCR_URL: https://ghcr.io
      WUD_REGISTRY_GHCR_TOKEN: ${GHCR_TOKEN:-}
    ports:
      - "3001:3000"
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

networks:
  internal:
    driver: overlay
  public:
    driver: overlay

volumes:
  pg_data:
  wud_store:
